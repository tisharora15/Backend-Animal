# ═══════════════════════════════════════════════════════════════
#  RescuePaw Backend — application.properties
# ═══════════════════════════════════════════════════════════════

server.port=8080

# ── PostgreSQL ──────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/rescuepaw
spring.datasource.username=postgres
spring.datasource.password=prime
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Data Seeding ────────────────────────────────────────────────
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ── JWT ─────────────────────────────────────────────────────────
# Secret must be at least 32 characters long
jwt.secret=rescuepaw-secret-key-2024-must-be-32-chars-min
# Expiration in milliseconds: 86400000 = 24 hours
jwt.expiration=86400000

# ── Logging ─────────────────────────────────────────────────────
logging.level.com.rescuepaw=DEBUG
logging.level.org.springframework.security=WARN
